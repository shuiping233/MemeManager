name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 1) 文件系统发布：自包含 exe 文件夹，压缩为 zip
  publish-zip:
    runs-on: windows-latest
    env:
      PUBLISH_DIR: ${{ github.workspace }}\publish-output
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (FileSystem)
        run: dotnet publish MemeManager.csproj -c Release -p:Platform=x64 -p:PublishProfile=win-x64 -o "$env:PUBLISH_DIR"

      - name: Compress publish output
        run: Compress-Archive -Path "$env:PUBLISH_DIR\*" -DestinationPath "MemeManager-win-x64.zip" -Force

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemeManager-win-x64-zip
          path: MemeManager-win-x64.zip

  # 2) MSIX 打包（未签名，需旁加载/开发者模式安装）
  pack-msix:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Generate MSIX package
        run: dotnet build MemeManager.csproj -c Release -p:Platform=x64 -p:GenerateAppxPackageOnBuild=true

      - name: Upload msix artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemeManager-win-x64-msix
          path: AppPackages/**/*.msix

  # 3) 创建 GitHub Release 并附上两个产物
  release:
    needs: [publish-zip, pack-msix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/MemeManager-win-x64-zip/MemeManager-win-x64.zip
            artifacts/MemeManager-win-x64-msix/*.msix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
